# tinyRAG_pipeline 独立配置文件
# 所有路径相对于本文件所在目录解析

# ── tinyRAG 代码根目录 ──────────────────────────────
# tinyRAG_pipeline 作为独立项目，不依赖 tinyRAG
# 此配置已废弃，保留仅为兼容性
tinyrag_root: /home/fallleaf/tinyRAG_pipeline

# ── 知识库 Vault ────────────────────────────────────
vaults:
  - path: "~/tinyRAG_pipeline/vault"
    name: test
    enabled: false
    exclude:
      dirs: []
      patterns: []
  - path: "~/NanobotMemory"
    name: personal
    enabled: true
    exclude:
      dirs:
        - "10.模板"
      patterns: []
  - path: "/home/fallleaf/Obsidian"
    name: work
    enabled: true
    exclude:
      dirs:
        - "copilot"
        - "99.模板"
        - "Excalidraw"
        - "98.附件"
      patterns: []

  # 家庭物品管理系统
  - path: "~/household/items"
    name: home_items
    enabled: true
    exclude:
      dirs: []
      patterns: []
# ── 全局排除规则 ────────────────────────────────────
exclude:
  dirs:
    - ".git"
    - ".obsidian"
    - ".trash"
    - "node_modules"
    - "__pycache__"
    - ".venv"
    - "venv"
    - ".idea"
    - ".vscode"
    - ".ruff_cache"
    - ".mypy_cache"
    - ".pytest_cache"
    - "dist"
    - "build"
    - ".egg-info"
  patterns:
    - ".*"
    - "*.tmp"
    - "*.bak"
    - "*.swp"
    - "*.swo"
    - "*~"
    - "*.pyc"
    - "*.pyo"
    - "*.exe"
    - "*.dll"
    - "*.so"
    - "*.dylib"
    - "*.zip"
    - "*.tar"
    - "*.gz"
    - "*.rar"
    - "*.7z"
    - "*.pdf"
    - "*.doc"
    - "*.docx"
    - "*.xls"
    - "*.xlsx"
    - "*.ppt"
    - "*.pptx"
    - "*.jpg"
    - "*.jpeg"
    - "*.png"
    - "*.gif"
    - "*.bmp"
    - "*.ico"
    - "*.svg"
    - "*.mp3"
    - "*.mp4"
    - "*.avi"
    - "*.mov"
    - "*.wav"
    - "*.flac"
    - "*.db"
    - "*.sqlite"
    - "*.sqlite3"
    - "*.log"
    - "package-lock.json"
    - "yarn.lock"
    - "pnpm-lock.yaml"
    - "Cargo.lock"
    - "poetry.lock"

# ── 数据库 ──────────────────────────────────────────
db_path: "./data/rag.db"

# ── 物品存储目录（家庭物品管理系统）──────────────────
items_dir: "~/household/items"

# ── 嵌入模型 ────────────────────────────────────────
embedding_model:
  name: "jinaai/jina-embeddings-v2-base-zh"
  cache_dir: "./models"
  size: "base"
  dimensions: 768
  batch_size: 32
  unload_after_seconds: 300

# ── 分块 ────────────────────────────────────────────
chunking:
  max_tokens: 512
  overlap: 100
  token_mode: "tiktoken"
  chinese_chars_per_token: 1.5
  english_chars_per_token: 4.0
  max_chars_multiplier: 2.5

# ── 置信度评分 ──────────────────────────────────────
confidence:
  type_rules:
    code: 1.1
    table: 1.05
    header: 1.0
    text: 0.95
    list: 0.9
    item: 1.0
  doc_type_rules:
    official: 1.2
    project: 1.15
    technical: 1.1
    dairy: 0.9
    blog: 0.9
    archive: 0.7
  status_rules:
    published: 1.2
    已发布: 1.2
    completed: 1.1
    已完成: 1.1
    active: 0.9
    编写中: 0.9
    draft: 0.7
    archived: 0.5
    存档: 0.5
    # 物品状态
    lost: 0.3
    lent: 0.7
  date_decay:
    enabled: true
    half_life_days: 365
    min_weight: 0.5
    type_specific_decay:
      official: 1825
      project: 730
      technical: 1095
      personal: 180
      diary: 180
      archive: 90
      item: 365
  default_weight: 1.0

# ── 日志级别 ────────────────────────────────────────
log_level: "INFO"

# ── 运维 ────────────────────────────────────────────
maintenance:
  soft_delete_threshold: 0.2
  auto_vacuum: true

# ── 缓存 ────────────────────────────────────────────
cache:
  db_path: "./data/cache.db"
  ttl_seconds: 36000
  max_entries: 1000

# ── 检索 ────────────────────────────────────────────
retrieval:
  alpha: 0.6
  beta: 0.4

# ── jieba 分词 ──────────────────────────────────────
jieba_user_dict: "./data/jieba_user_dict.txt"
jieba_seg_mode: "precise"  # "precise" 精确模式 / "search" 搜索引擎模式

# ── 索引构建 ────────────────────────────────────────
stream_batch_size: 64
max_concurrent_files: 4

# 内存监控配置
memory:
  limit_mb: 4096              # 内存限制（MB），默认 4GB
  check_interval: 100         # 内存检查间隔（处理多少个 chunk 后检查一次）

# 流式处理配置
#stream_batch_size: 100       # 流式批处理大小
